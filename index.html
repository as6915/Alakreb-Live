<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>البث المباشر</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0e14;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .player-container {
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #0a0e14;
            padding: 20px;
        }

        .player-wrapper {
            width: 100%;
            max-width: 100vw;
            aspect-ratio: 16 / 9;
            background: #000;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 0 60px rgba(145, 70, 255, 0.05), 0 20px 60px rgba(0, 0, 0, 0.8);
            border: 1px solid rgba(145, 70, 255, 0.03);
        }

        .player-wrapper iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }

        @media (max-width: 768px) {
            .player-container {
                padding: 10px;
            }
            .player-wrapper {
                border-radius: 10px;
            }
        }
    </style>
</head>
<body>

    <div class="player-container">
        <div class="player-wrapper">
            <iframe id="player" src="" allowfullscreen></iframe>
        </div>
    </div>

    <script>
        (function() {
            const player = document.getElementById('player');
            const channel = 'majed20267';
            player.src = `https://player.twitch.tv/?channel=${channel}&parent=${window.location.hostname}&autoplay=true&muted=false`;

            setInterval(() => {
                if (player.src && !player.src.includes('about:blank')) {
                    const current = player.src;
                    if (!current.includes('autoplay=true')) {
                        player.src = current + '&autoplay=true';
                    }
                }
            }, 30000);
        })();
    </script>

</body>
</html>
